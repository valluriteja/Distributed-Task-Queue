version: '3.8'

services:
  redis:
    image: redis:latest
    container_name: redis-task-queue
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: task-queue-api
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis

  worker:
    build: .
    container_name: task-queue-worker
    command: python worker.py
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis